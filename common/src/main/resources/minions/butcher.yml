    type: gold_ingot
    name: <#00CCFF><b>Улучшить миньона
    lore:
    - ''
    - ' <gray>- <white>Уровень: <green><level> → <dark_green><next_level>'
    - ' <gray>- <white>Радиус: <green><range> → <dark_green><next_range>'
    - ' <gray>- <white>Скорость: <green><speed> → <dark_green><next_speed>'
    - ''
    - '<#00CCFF>Требования:'
    - ' <gray>- <white>Деньги: <#33FF33><price>$'
    - ' <gray>- <white>Убито мобов: <#33FF33><required_actions>'
    - ''
    - <#00CCFF><b>(!)</b> Нажмите сюда, чтобы улучшить миньона!
  bonus-loot-upgrade:
    type: emerald
    name: <#33FF99><b>Улучшить добычу
    lore:
    - ''
    - ' <gray>- <white>Уровень добычи: <green><bonus_loot_level> → <dark_green><next_bonus_loot_level>'
    - ' <gray>- <white>Шанс бонуса: <green><upgrade_bonus_loot_chance>% → <dark_green><next_upgrade_bonus_loot_chance>%'
    - ' <gray>- <white>Множитель: <green>x<upgrade_bonus_loot_multiplier> → <dark_green>x<next_upgrade_bonus_loot_multiplier>'
    - ''
    - '<#33FF99>Требования:'
    - ' <gray>- <white>Деньги: <#33FF33><bonus_loot_price>$'
    - ' <gray>- <white>Действия: <#33FF33><bonus_loot_required_actions>'
    - ''
    - <#33FF99><b>(!)</b> Нажмите сюда, чтобы улучшить бонусную добычу!
  statistics:
    type: paper
    name: <#FFAA33><b>Статистика
    lore:
    - ''
    - ' <gray>- <white>Убито мобов: <#FFAA33><actions>'
    - ' <gray>- <white>Накоплено опыта: <#CC00FF><storage>'
    - ''

