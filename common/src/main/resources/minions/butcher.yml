  name: <#FFAA33>Мясник <white>Миньон
  lore:
  - ''
  - ' <gray>- <white>Убивает мирных мобов вокруг себя.'
  - ''
  - <#FFAA33>Статистика
  - ' <#FFAA33>* <white>Уровень: <#FFEEAA><level>'
