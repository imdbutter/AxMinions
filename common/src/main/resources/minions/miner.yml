name: <#00AAFF>Шахтёр <white>Миньон

entity:
  name: <level_color>[<level>] <#00AAFF>Шахтёр <white>Миньон <gray>[<owner>]

tool:
  material:
  - WOODEN_PICKAXE
  - STONE_PICKAXE
  - GOLDEN_PICKAXE
  - IRON_PICKAXE
  - DIAMOND_PICKAXE
  - NETHERITE_PICKAXE

# Может быть: sphere, line, face, asphere
# Если установлено sphere: проверяет блоки в сфере с радиусом, равным радиусу миньона (наиболее ресурсоёмко, чем больше радиус, тем хуже)
# Если установлено line: проверяет блоки во всех 4 направлениях от миньона в пределах радиуса миньона (лучшее соотношение производительности к сломанным блокам)
# Если установлено face: проверяет блоки только по направлению взгляда миньона (наименее ресурсоёмко)
# Если установлено asphere: проверяет блоки в сфере с радиусом миньона вокруг миньона
# Переключайтесь на режим asphere, только если знаете, что делаете,
# так как это может вызвать некоторые проблемы из-за одновременного изменения состояний!
mode: face

# Может быть generator или whitelist
# В режиме generator миньон добывает только блоки из каменного генератора (вода и лава по бокам блока)
# В режиме whitelist он будет ломать все блоки, которые соответствуют вайтлисту
break: whitelist

